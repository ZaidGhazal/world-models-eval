# Mac sanity config — MPS, fp32, minutes not hours.
run_name: smolvla_tiny
pretrained: lerobot/smolvla_base
dataset_root: data/lerobot/world-model-eval/dreamgrasp-libero
split: train
episodes: 5
image_size: 64
chunk_size: 8
n_action_steps: 8
fps: 20

steps: 200
batch_size: 2
grad_accum: 1
lr: 1.0e-4
warmup_steps: 20
grad_clip: 1.0
num_workers: 0

log_every: 10
save_every: 200
out_dir: checkpoints/policy/smolvla_tiny
wandb: offline
seed: 0
