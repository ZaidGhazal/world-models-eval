# WM-5: data=1.00, context=8, dynamics 12L/512d
name: wm_tier5
dataset_url: https://huggingface.co/datasets/zaid9876/world-models-eval
dataset_repo_id: zaid9876/world-models-eval
dataset_revision: v3.0
dataset_root: data/lerobot/world-models-eval
split: train
data_fraction: 1.00
image_size: 128
precision: bf16
latent_dim: 8
context: 8
n_layers: 12
d_model: 512
n_heads: 8
lpips_weight: 0.1

vae_steps: 20000
dyn_steps: 60000
batch_size: 8
grad_accum: 2   # effective batch 16; batch 8 fits the LPIPS dyn stage in 24 GB
resume_vae: true
lr: 3.0e-4
warmup_steps: 500
grad_clip: 1.0
num_workers: 4
log_every: 100
save_every: 10000
out_dir: checkpoints/world_model/tier_5
wandb: online
seed: 0
